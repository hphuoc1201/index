<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>House Routine</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Một ngày trong nhà</p>
        <h1>House Routine</h1>
        <p class="intro">Giữ nhân vật sống sót qua những ngày bình thường: ăn, làm việc, ngủ, tâm sự và xử lý đồ giặt khi trời mưa.</p>
      </div>
      <button id="restartBtn" class="ghost-button">Chơi lại</button>
    </section>

    <section class="dashboard" aria-label="Trạng thái nhân vật">
      <article class="stat"><span>Ngày</span><strong id="day">1</strong></article>
      <article class="stat"><span>Giờ</span><strong id="clock">06:00</strong></article>
      <article class="stat"><span>Vị trí</span><strong id="location">Phòng ngủ</strong></article>
      <article class="stat"><span>Thời tiết</span><strong id="weather">Nắng</strong></article>
    </section>

    <section class="meters" aria-label="Chỉ số sống còn">
      <div class="meter"><label>Năng lượng <b id="energyText"></b></label><progress id="energy" max="100"></progress></div>
      <div class="meter"><label>Đói <b id="hungerText"></b></label><progress id="hunger" max="100"></progress></div>
      <div class="meter danger"><label>Stress <b id="stressText"></b></label><progress id="stress" max="100"></progress></div>
    </section>

    <section class="game-grid">
      <div class="house" id="house"></div>

      <aside class="panel">
        <h2>Hành động</h2>
        <div id="actions" class="actions"></div>

        <h2>Nhật ký</h2>
        <ol id="log" class="log"></ol>
      </aside>
    </section>

    <section id="gameOver" class="game-over hidden" role="alert"></section>
  </main>

  <script src="src/game.js"></script>
</body>
</html>
